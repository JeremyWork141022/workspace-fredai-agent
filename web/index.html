<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRT Analytics</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar" aria-label="Thread history">
        <div class="brand">
          <div class="mark" aria-hidden="true">C</div>
          <div>
            <h1>CRT Analytics Agent</h1>
            <p id="connectionStatus">Checking server</p>
          </div>
        </div>

        <button id="newSessionButton" class="new-thread-button" type="button">
          <span aria-hidden="true">+</span>
          New Thread
        </button>

        <nav id="threadList" class="thread-list" aria-label="Shared threads"></nav>

        <div class="status-panel" aria-label="Server status">
          <div>
            <span>Model</span>
            <strong id="modelName">-</strong>
          </div>
          <div>
            <span>Tools</span>
            <strong id="toolCount">-</strong>
          </div>
          <div>
            <span>Last request</span>
            <strong id="lastRequest">-</strong>
          </div>
        </div>

        <input id="workspaceId" type="hidden" value="shared_workspace" />
        <input id="userId" type="hidden" value="shared" />
        <input id="sessionId" type="hidden" />
      </aside>

      <section class="chat" aria-label="Agent chat">
        <header class="chat-header">
          <div>
            <span>Current thread</span>
            <h2 id="currentThreadTitle">Ask me anything about CRT Analytics</h2>
          </div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>
        <button id="scrollToBottomButton" class="scroll-button hidden" type="button" aria-label="Scroll to latest message">
          Latest
        </button>

        <form id="chatForm" class="composer">
          <div id="attachmentList" class="attachment-list" aria-live="polite"></div>
          <div id="composerShell" class="composer-shell">
            <input
              id="fileInput"
              class="file-input"
              type="file"
              multiple
              accept=".pdf,.png,.jpg,.jpeg,.gif,.bmp,.webp,.tif,.tiff,.csv,.tsv,.xlsx,.docx,.pptx,.rtf,.txt,.md,.json,.xml,.yaml,.yml,.toml,.ini,.cfg,.log,.html,.htm,.sql"
            />
            <button id="attachButton" class="icon-button" type="button" title="Attach files" aria-label="Attach files">
              +
            </button>
            <textarea id="messageInput" rows="1" placeholder="Ask me about CRT Analytics"></textarea>
            <div class="composer-actions">
              <button
                id="copySessionButton"
                class="composer-link-button"
                type="button"
                data-action="share-thread"
                onclick="event.preventDefault(); event.stopPropagation(); window.crtShareThread && window.crtShareThread();"
              >
                Share Thread
              </button>
              <div id="shareBar" class="share-bar hidden" aria-live="polite">
                <span id="shareCount">0 selected</span>
                <button
                  id="copyShareButton"
                  type="button"
                  data-action="share-selected"
                  onclick="event.preventDefault(); event.stopPropagation(); window.crtShareSelected && window.crtShareSelected();"
                >
                  Share Selected
                </button>
                <button
                  id="clearShareButton"
                  type="button"
                  data-action="clear-share-selection"
                  onclick="event.preventDefault(); event.stopPropagation(); window.crtClearShareSelection && window.crtClearShareSelection();"
                >
                  Clear
                </button>
              </div>
              <button id="stopButton" class="primary-button hidden" type="button">Stop</button>
              <button id="sendButton" class="primary-button" type="submit">Send</button>
            </div>
          </div>
          <div class="composer-footer">
            <div id="turnMeta" class="turn-meta"></div>
            <p class="disclaimer">CRT Analytics can make mistakes. Check important work outputs.</p>
          </div>
        </form>
      </section>
    </main>

    <script src="/static/app.js?v=20260628-rename-draft"></script>
  </body>
</html>
