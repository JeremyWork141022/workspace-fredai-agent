<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workspace FredAI Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar" aria-label="Workspace context">
        <div class="brand">
          <div class="mark" aria-hidden="true">F</div>
          <div>
            <h1>Workspace FredAI Agent</h1>
            <p id="connectionStatus">Checking server</p>
          </div>
        </div>

        <form id="contextForm" class="context-form">
          <label>
            Workspace
            <input id="workspaceId" name="workspaceId" autocomplete="off" value="workspace_123" />
          </label>
          <label>
            User
            <input id="userId" name="userId" autocomplete="off" value="user_456" />
          </label>
          <label>
            Session
            <input id="sessionId" name="sessionId" autocomplete="off" placeholder="created after first reply" />
          </label>
          <div class="button-row">
            <button id="newSessionButton" type="button">New Session</button>
            <button id="copySessionButton" type="button">Copy Session</button>
          </div>
        </form>

        <div class="status-panel" aria-label="Server status">
          <div>
            <span>Model</span>
            <strong id="modelName">-</strong>
          </div>
          <div>
            <span>Tools</span>
            <strong id="toolCount">-</strong>
          </div>
          <div>
            <span>Last request</span>
            <strong id="lastRequest">-</strong>
          </div>
        </div>
      </aside>

      <section class="chat" aria-label="Agent chat">
        <div id="messages" class="messages" aria-live="polite"></div>
        <button id="scrollToBottomButton" class="scroll-button hidden" type="button" aria-label="Scroll to latest message">
          Latest
        </button>

        <form id="chatForm" class="composer">
          <div id="attachmentList" class="attachment-list" aria-live="polite"></div>
          <div id="composerShell" class="composer-shell">
            <input
              id="fileInput"
              class="file-input"
              type="file"
              multiple
              accept=".csv,.xls,.xlsx,.pdf,.doc,.docx,.txt,.md,.json,.xml,.yaml,.yml,.log"
            />
            <button id="attachButton" class="icon-button" type="button" title="Attach files" aria-label="Attach files">
              +
            </button>
            <textarea id="messageInput" rows="1" placeholder="Ask anything about your workspace"></textarea>
            <button id="stopButton" class="primary-button hidden" type="button">Stop</button>
            <button id="sendButton" class="primary-button" type="submit">Send</button>
          </div>
          <div class="composer-footer">
            <div id="turnMeta" class="turn-meta"></div>
            <p class="disclaimer">FredAI can make mistakes. Check important work outputs.</p>
          </div>
        </form>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
